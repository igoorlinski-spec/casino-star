services:
  # ─────────────────────────────────────────────
  # BACKEND – Node.js / Express / Socket.io
  # ─────────────────────────────────────────────
  - type: web
    name: casino-star-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: casino-star-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: casino-star-frontend
          type: web
          property: host

  # ─────────────────────────────────────────────
  # FRONTEND – React / Vite (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: casino-star-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: casino-star-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ─────────────────────────────────────────────
  # BAZA DANYCH – PostgreSQL
  # ─────────────────────────────────────────────
databases:
  - name: casino-star-db
    plan: free
    databaseName: casinostar
    user: casinostar_user
